<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Creador de Torneos Pádel</title>
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192" />
    
    <!-- iOS / Safari Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TorneoPádel" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body class="bg-neutral-50 text-neutral-900 antialiased overscroll-y-contain">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registrado con éxito en el ámbito:', reg.scope);
            })
            .catch((err) => {
              console.error('[PWA] Error al registrar el Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
