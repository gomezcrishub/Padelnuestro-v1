<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with dark premium feel -->
  <rect width="512" height="512" rx="128" fill="#0A0A0A" />
  
  <!-- Subtle inner glowing ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#262626" stroke-width="4" />
  
  <g transform="translate(256, 256)">
    <!-- Main Padel Racket Background/Glow -->
    <path d="M-90,-160 C-40,-160 -10,-130 -10,-80 C-10,-40 -35,-10 -60,15 L-60,110 L-100,110 L-100,15 C-125,-10 -150,-40 -150,-80 C-150,-130 -120,-160 -90,-160 Z" fill="#171717" stroke="#404040" stroke-width="6" transform="rotate(-25)" />
    
    <!-- Padel Racket 1 Base and Face -->
    <!-- Racket Head -->
    <ellipse cx="-50" cy="-60" rx="65" ry="75" fill="#1C1917" stroke="#84CC16" stroke-width="12" transform="rotate(-15)" />
    <!-- Racket holes grid pattern -->
    <g transform="rotate(-15) translate(-50, -60)">
      <circle cx="-25" cy="-35" r="5" fill="#84CC16" />
      <circle cx="0" cy="-35" r="5" fill="#84CC16" />
      <circle cx="25" cy="-35" r="5" fill="#84CC16" />
      
      <circle cx="-35" cy="-15" r="5" fill="#84CC16" />
      <circle cx="-12" cy="-15" r="5" fill="#84CC16" />
      <circle cx="12" cy="-15" r="5" fill="#84CC16" />
      <circle cx="35" cy="-15" r="5" fill="#84CC16" />
      
      <circle cx="-40" cy="5" r="5" fill="#84CC16" />
      <circle cx="-20" cy="5" r="5" fill="#84CC16" />
      <circle cx="0" cy="5" r="5" fill="#84CC16" />
      <circle cx="20" cy="5" r="5" fill="#84CC16" />
      <circle cx="40" cy="5" r="5" fill="#84CC16" />
      
      <circle cx="-35" cy="25" r="5" fill="#84CC16" />
      <circle cx="-12" cy="25" r="5" fill="#84CC16" />
      <circle cx="12" cy="25" r="5" fill="#84CC16" />
      <circle cx="35" cy="25" r="5" fill="#84CC16" />
      
      <circle cx="-25" cy="45" r="5" fill="#84CC16" />
      <circle cx="0" cy="45" r="5" fill="#84CC16" />
      <circle cx="25" cy="45" r="5" fill="#84CC16" />
    </g>
    <!-- Racket Handle & Grip -->
    <g transform="rotate(-15)">
      <!-- Throat -->
      <path d="M-20,15 L0,5 L20,15 L10,50 L-10,50 Z" fill="#292524" stroke="#84CC16" stroke-width="3" />
      <!-- Handle Shaft -->
      <rect x="-8" y="45" width="16" height="110" rx="4" fill="#292524" stroke="#84CC16" stroke-width="4" />
      <!-- Grip wraps details -->
      <line x1="-8" y1="75" x2="8" y2="85" stroke="#44403C" stroke-width="3" />
      <line x1="-8" y1="100" x2="8" y2="110" stroke="#44403C" stroke-width="3" />
      <line x1="-8" y1="125" x2="8" y2="135" stroke="#44403C" stroke-width="3" />
      <!-- Handle Butt -->
      <rect x="-12" y="150" width="24" height="12" rx="3" fill="#84CC16" />
    </g>

    <!-- Stunning Electric Lime Padel Ball overlapping the racket -->
    <!-- Outer Glow -->
    <circle cx="85" cy="50" r="75" fill="#A3E635" opacity="0.15" />
    <!-- Ball body -->
    <circle cx="85" cy="50" r="55" fill="#BEF264" stroke="#84CC16" stroke-width="8" />
    <!-- Curved seams (the signature tennis/padel curved lines) -->
    <path d="M43,25 C70,40 70,60 43,75" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" />
    <path d="M127,25 C100,40 100,60 127,75" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>
